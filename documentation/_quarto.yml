project:
  type: book
  output-dir: ../site/public/documentation

bibliography: ../bibliography.bib

book:
  title: "DORAEMON Documentation"
  site-url: "https://deeplearnphysics.github.io/doraemon_site/documentation/"
  repo-url: "https://github.com/deeplearnphysics/doraemon_site"
  repo-subdir: documentation
  repo-actions: [source]
  page-navigation: true
  navbar:
    left:
      - text: DORAEMON Home
        href: ../
      - text: Challenges
        href: ../challenges/
      - text: Data Hub
        href: ../data-hub/
      - text: Software
        href: ../software/
  sidebar:
    style: docked
    search: true
  chapters:
    - index.qmd
    - part: Getting Started
      chapters:
        - getting-started/index.qmd
        - getting-started/architecture.qmd
        - getting-started/records.qmd
        - getting-started/contributing.qmd
    - part: Challenge Reference
      chapters:
        - opendc/index.qmd
        - opendc/research-challenges.qmd
        - opendc/rules.qmd
        - opendc/metrics.qmd
    - part: Physics Notes
      chapters:
        - physics/index.qmd
        - physics/particle-physics.qmd
        - physics/neutrinos.qmd
        - physics/detecting-neutrinos.qmd
    - part: Software
      chapters:
        - software/index.qmd
    - part: Dataset Schema Notes
      chapters:
        - datasets/lartpc-fm-v1-schema.qmd
        - datasets/multi-source-cross-detector-records-schema.qmd
        - datasets/water-cherenkov-pid-v0-schema.qmd
        - datasets/icecube-energy-regression-v0-schema.qmd

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: true
    number-depth: 3
    link-external-newwindow: true
    css: styles.css
