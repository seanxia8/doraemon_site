name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: sites/docs/yarn.lock

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install packages
        run: yarn --cwd sites/docs install --frozen-lockfile

      - name: Build static site
        run: make docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sites/docs/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
